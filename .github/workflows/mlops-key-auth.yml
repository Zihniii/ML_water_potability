name: MLOps — Key Auth (no service principal)

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - "dataset/**"
      - "config/train.yaml"
      - "config/hyperparameters.yaml"
      - "train.py"
      - "app.py"
      - "dataset_manager.py"
      - "prediction_logger.py"
      - "requirements.txt"
      - "Dockerfile"
      - "scripts/**"
  workflow_dispatch:
    inputs:
      dataset_version:
        description: "Override dataset version (leave empty for auto)"
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHON_VERSION: "3.11"
  AZURE_STORAGE_ACCOUNT: ${{ secrets.AZURE_STORAGE_ACCOUNT }}
  AZURE_STORAGE_CONTAINER: datasets
  MLFLOW_EXPERIMENT_NAME: water-potability-mlops
  MODEL_NAME: water_potability_model
  MODEL_STAGE_OR_ALIAS: Production
  DATASET_LOCAL_PATH: dataset/water_potability.csv
  IMAGE_NAME: water-potability-api
  ACR_NAME: ${{ secrets.AZURE_ACR_NAME }}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Syntax check
        run: |
          python -m py_compile train.py
          python -m py_compile app.py
          python -m py_compile dataset_manager.py
          python -m py_compile prediction_logger.py
      - name: Validate config YAML
        run: |
          python -c "import yaml; yaml.safe_load(open('config/train.yaml'))"
          echo "Config valid"

  mlops-pipeline:
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate dataset version
        id: version
        run: |
          if [ -n "${{ inputs.dataset_version }}" ]; then
            echo "DATASET_VERSION=${{ inputs.dataset_version }}" >> $GITHUB_OUTPUT
          else
            echo "DATASET_VERSION=$(date -u +'%Y-%m-%d_%H%M%S')" >> $GITHUB_OUTPUT
          fi

      - name: Upload dataset to Blob Storage
        run: |
          DATASET_VERSION="${{ steps.version.outputs.DATASET_VERSION }}"
          az storage blob upload \
            --account-name ${{ env.AZURE_STORAGE_ACCOUNT }} \
            --account-key ${{ secrets.AZURE_STORAGE_KEY }} \
            --container-name ${{ env.AZURE_STORAGE_CONTAINER }} \
            --file ${{ env.DATASET_LOCAL_PATH }} \
            --name "${DATASET_VERSION}/water_potability.csv"
          az storage blob upload \
            --account-name ${{ env.AZURE_STORAGE_ACCOUNT }} \
            --account-key ${{ secrets.AZURE_STORAGE_KEY }} \
            --container-name ${{ env.AZURE_STORAGE_CONTAINER }} \
            --file ${{ env.DATASET_LOCAL_PATH }} \
            --name "latest_water_potability.csv" \
            --overwrite
          echo "Uploaded: ${DATASET_VERSION}"

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Train model
        run: |
          python train.py --config config/train.yaml --hyperparameters config/hyperparameters.yaml || \
          python train.py --config config/train.yaml
        env:
          DATASET_PATH: ${{ env.DATASET_LOCAL_PATH }}
          DATASET_VERSION: ${{ steps.version.outputs.DATASET_VERSION }}
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_EXPERIMENT_NAME: ${{ env.MLFLOW_EXPERIMENT_NAME }}
          MODEL_NAME: ${{ env.MODEL_NAME }}

      - name: Build and push Docker image to ACR
        run: |
          ACR="${{ env.ACR_NAME }}.azurecr.io"
          SHA_TAG="${ACR}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          VERSION_TAG="${ACR}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.DATASET_VERSION }}"
          docker login ${ACR} \
            -u "${{ secrets.ACR_USERNAME }}" \
            -p "${{ secrets.ACR_PASSWORD }}"
          docker build -t ${SHA_TAG} -t ${VERSION_TAG} .
          docker push ${SHA_TAG}
          docker push ${VERSION_TAG}
          echo "IMAGE_TAG=${SHA_TAG}" >> $GITHUB_ENV
